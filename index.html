<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Minimalist Grid</title>
    <style>
        /* General Layout */
        body { 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
            background: #020205; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            transition: background 0.3s ease;
        }

        /* Top Left Label */
        #label {
            position: absolute; 
            top: 20px; 
            left: 20px;
            color: #00ffff; 
            font-size: 11px; 
            font-weight: bold;
            letter-spacing: 2px;
            pointer-events: none; 
            opacity: 0.8;
            text-transform: uppercase;
        }

        /* Right Side Toolbar */
        #toolbar {
            position: absolute;
            top: 50%;
            right: 25px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 100;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        /* Theme Toggle Button */
        #theme-toggle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #00ffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        #theme-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #020205;
            transition: all 0.3s ease;
        }

        /* Light Mode Styles */
        body.light-mode { background: #f5f5f7; }
        
        body.light-mode #label { color: #333; }
        
        body.light-mode #toolbar {
            background: rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(0, 0, 0, 0.1);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        body.light-mode #theme-toggle {
            background: #222;
        }

        body.light-mode #theme-icon {
            background: #fff;
            transform: scale(0.8);
        }
    </style>
</head>
<body>

    <div id="label">36x36x36 SYSTEM // GRID VIEW</div>

    <div id="toolbar">
        <button id="theme-toggle" title="Toggle Light/Dark Mode">
            <div id="theme-icon"></div>
        </button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const size = 36;
        let isDarkMode = true;

        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);

        // 2. Camera Setup
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(45, 35, 45);

        // 3. Renderer Setup
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        // 4. Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;

        // 5. Grid Creation (Enhanced Visibility)
        // We use a group so we can easily swap it for light mode
        let gridGroup = new THREE.Group();
        scene.add(gridGroup);

        function updateGrid(dark) {
            // Clear existing grid
            while(gridGroup.children.length > 0){ 
                gridGroup.remove(gridGroup.children[0]); 
            }

            const mainColor = dark ? 0x00ffff : 0x0055ff;
            const subColor = dark ? 0x222222 : 0xcccccc;
            
            const gridHelper = new THREE.GridHelper(size, size, mainColor, subColor);
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = dark ? 0.8 : 0.5;
            gridGroup.add(gridHelper);
        }
        
        updateGrid(true);

        // 6. Single Height Edge
        const heightPoints = [
            new THREE.Vector3(-size/2, 0, -size/2),
            new THREE.Vector3(-size/2, size, -size/2)
        ];
        const heightGeom = new THREE.BufferGeometry().setFromPoints(heightPoints);
        const heightMat = new THREE.LineBasicMaterial({ color: 0xff00ff, linewidth: 2 });
        const heightEdge = new THREE.Line(heightGeom, heightMat);
        scene.add(heightEdge);

        // 7. Theme Toggle Logic
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode');

            // Update Scene
            const bgColor = isDarkMode ? 0x020205 : 0xf5f5f7;
            scene.background.set(bgColor);

            // Update Grid Colors
            updateGrid(isDarkMode);

            // Update Height Edge Color
            heightEdge.material.color.set(isDarkMode ? 0xff00ff : 0x000000);
        });

        // 8. Animation & Resize
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
