<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Minimalist Grid</title>
    <style>
        /* General Layout */
        body, html { 
            margin: 0; 
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; 
            background: #020205; 
            font-family: 'Segoe UI', sans-serif; 
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* Top Left Label */
        #label {
            position: absolute; 
            top: 20px; 
            left: 20px;
            color: #00ffff; 
            font-size: 11px; 
            font-weight: bold;
            letter-spacing: 2px;
            pointer-events: none; 
            z-index: 100;
            text-transform: uppercase;
        }

        /* Right Side Toolbar */
        #toolbar {
            position: fixed; /* Changed to fixed to stay on top */
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            padding: 12px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            z-index: 999; /* Ensure it is above the canvas */
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Theme Toggle Button */
        #theme-toggle {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: #00ffff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #theme-toggle:active {
            transform: scale(0.9);
        }

        #theme-icon {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            background: #020205;
        }

        /* Light Mode Styles */
        body.light-mode { background: #f0f0f2; }
        body.light-mode #label { color: #222; }
        body.light-mode #toolbar {
            background: rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        body.light-mode #theme-toggle { background: #222; }
        body.light-mode #theme-icon { background: #fff; }
    </style>
</head>
<body>

    <div id="label">36x36x36 SYSTEM // GRID VIEW</div>

    <div id="toolbar">
        <button id="theme-toggle" title="Toggle Light/Dark Mode">
            <div id="theme-icon"></div>
        </button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const size = 36;
        let isDarkMode = true;

        // 1. Scene & Camera
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(45, 35, 45);

        // 2. Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 3. Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 4. Grid Reference
        let gridHelper;
        function createGrid(dark) {
            if (gridHelper) scene.remove(gridHelper);
            
            const color1 = dark ? 0x00ffff : 0x000000; // Major lines
            const color2 = dark ? 0x222222 : 0xcccccc; // Minor lines
            
            gridHelper = new THREE.GridHelper(size, size, color1, color2);
            gridHelper.material.transparent = true;
            gridHelper.material.opacity = dark ? 0.8 : 0.4;
            scene.add(gridHelper);
        }
        createGrid(true);

        // 5. Height Edge
        const points = [new THREE.Vector3(-size/2, 0, -size/2), new THREE.Vector3(-size/2, size, -size/2)];
        const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
        const lineMat = new THREE.LineBasicMaterial({ color: 0xff00ff });
        const heightEdge = new THREE.Line(lineGeom, lineMat);
        scene.add(heightEdge);

        // 6. Theme Logic
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode');

            scene.background.set(isDarkMode ? 0x020205 : 0xf0f0f2);
            heightEdge.material.color.set(isDarkMode ? 0xff00ff : 0x000000);
            createGrid(isDarkMode);
        });

        // 7. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
