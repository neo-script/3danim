<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Minimalist Grid</title>
    <style>
        body { margin: 0; overflow: hidden; background: #020205; font-family: sans-serif; }
        #label {
            position: absolute; top: 15px; left: 15px;
            color: #00ffff; font-size: 12px; letter-spacing: 1px;
            pointer-events: none; opacity: 0.7;
        }
    </style>
</head>
<body>
    <div id="label">36x36x36 SYSTEM // DRAG TO ROTATE</div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const size = 36;
        const halfSize = size / 2;

        // 1. Scene & Camera
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(40, 30, 40);

        // 2. Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 3. Controls (Mouse Scroll & Drag)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 4. Grid Geometry (Floor Only)
        const gridHelper = new THREE.GridHelper(size, size, 0x00ffff, 0x333333);
        // Make the lines brighter
        gridHelper.material.transparent = true;
        gridHelper.material.opacity = 0.8; 
        scene.add(gridHelper);

        // 5. Single Height Edge (The vertical reference)
        const points = [
            new THREE.Vector3(0, 0, 0),
            new THREE.Vector3(0, size, 0)
        ];
        const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
        const lineMat = new THREE.LineBasicMaterial({ color: 0xff00ff, linewidth: 3 });
        const heightEdge = new THREE.Line(lineGeom, lineMat);
        scene.add(heightEdge);

        // 6. Animation
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
