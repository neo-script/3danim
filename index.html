<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Minimalist Grid</title>
    <style>
        /* Your Original Base Styles */
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #020205;
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease;
        }

        #ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            color: rgba(255, 255, 255, 0.4);
            pointer-events: none;
            z-index: 10;
        }

        h1 {
            font-weight: 200;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin: 0;
            text-transform: uppercase;
        }

        p {
            font-size: 0.7rem;
            margin-top: 5px;
        }

        /* --- TOOLBAR STYLES (Fixed invisibility) --- */
        #toolbar {
            position: fixed;
            top: 50%;
            right: 30px;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000; /* Ensures it stays above the 3D scene */
        }

        #theme-toggle {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #00ffff; /* Neon Cyan */
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s ease, background-color 0.3s ease;
        }

        #theme-toggle:hover {
            transform: scale(1.1);
        }

        #theme-icon {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #020205;
        }

        /* Light Mode UI Adjustments */
        body.light-mode { background-color: #f0f0f2; }
        body.light-mode #ui-overlay { color: rgba(0, 0, 0, 0.6); }
        body.light-mode #toolbar { 
            background: rgba(0, 0, 0, 0.05); 
            border-color: rgba(0, 0, 0, 0.1); 
        }
        body.light-mode #theme-toggle { background: #222; }
        body.light-mode #theme-icon { background: #fff; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h1>3D Workspace</h1>
        <p>36x36x36 Grid • Drag to Rotate</p>
    </div>

    <div id="toolbar">
        <button id="theme-toggle" title="Toggle Theme">
            <div id="theme-icon"></div>
        </button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const size = 36;
        let isDarkMode = true;

        // 1. Scene & Camera
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x020205);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(45, 35, 45);

        // 2. Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 3. Controls
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // 4. Grid Helper
        let grid;
        function createGrid(dark) {
            if (grid) scene.remove(grid);
            const color1 = dark ? 0x00ffff : 0x0055ff;
            const color2 = dark ? 0x222222 : 0xcccccc;
            grid = new THREE.GridHelper(size, size, color1, color2);
            grid.material.transparent = true;
            grid.material.opacity = dark ? 0.8 : 0.5;
            scene.add(grid);
        }
        createGrid(true);

        // 5. Height Edge (Reference line)
        const points = [
            new THREE.Vector3(-size/2, 0, -size/2), 
            new THREE.Vector3(-size/2, size, -size/2)
        ];
        const lineGeom = new THREE.BufferGeometry().setFromPoints(points);
        const lineMat = new THREE.LineBasicMaterial({ color: 0xff00ff });
        const heightEdge = new THREE.Line(lineGeom, lineMat);
        scene.add(heightEdge);

        // 6. Theme Toggle Functionality
        const themeBtn = document.getElementById('theme-toggle');
        themeBtn.addEventListener('click', () => {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode');

            // Update Scene Background
            scene.background.set(isDarkMode ? 0x020205 : 0xf0f0f2);
            
            // Update Height Edge Color
            heightEdge.material.color.set(isDarkMode ? 0xff00ff : 0x000000);
            
            // Refresh Grid
            createGrid(isDarkMode);
        });

        // 7. Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
